<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarberShop Pro — Bienvenido</title>
    <meta name="description" content="Sistema profesional de barbería. Agenda tu cita o accede al panel de administración.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);overflow:hidden;position:relative;}
        body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 60% 40%,rgba(212,175,55,.06) 0%,transparent 60%);pointer-events:none;animation:slowspin 30s linear infinite;}
        @keyframes slowspin{to{transform:rotate(360deg);}}
        .deco{position:fixed;font-size:10rem;opacity:.025;pointer-events:none;font-weight:900;}
        .deco1{top:5%;left:3%;transform:rotate(-20deg);}
        .deco2{bottom:5%;right:3%;transform:rotate(160deg);}
        .hero{text-align:center;margin-bottom:3.5rem;animation:fadeSlide .7s ease;}
        .hero-logo{font-size:3.8rem;font-weight:900;letter-spacing:-2px;line-height:1;}
        .hero-logo span{color:var(--primary);}
        .hero-sub{color:var(--muted);margin-top:.5rem;font-size:1.05rem;}
        .cards{display:flex;gap:2rem;flex-wrap:wrap;justify-content:center;animation:fadeSlide .7s ease .15s both;}
        .role-card{width:290px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2.8rem 2rem;text-align:center;cursor:pointer;transition:all .35s;text-decoration:none;color:inherit;position:relative;overflow:hidden;}
        .role-card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(212,175,55,.08),transparent);opacity:0;transition:opacity .35s;}
        .role-card:hover{transform:translateY(-8px);border-color:var(--primary);box-shadow:0 20px 60px rgba(212,175,55,.12);}
        .role-card:hover::after{opacity:1;}
        .rc-icon{font-size:3.5rem;margin-bottom:1.2rem;display:block;}
        .rc-title{font-size:1.7rem;font-weight:800;margin-bottom:.4rem;}
        .rc-desc{color:var(--muted);font-size:.9rem;line-height:1.6;}
        .rc-cta{display:inline-block;margin-top:1.5rem;padding:.5rem 1.4rem;border-radius:30px;font-size:.88rem;font-weight:700;}
        .client-cta{background:rgba(212,175,55,.18);color:var(--primary);}
        .admin-cta{background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--border);}
        /* password modal */
        .pw-modal{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;z-index:900;opacity:0;pointer-events:none;transition:opacity .3s;}
        .pw-modal.open{opacity:1;pointer-events:all;}
        .pw-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2.8rem;width:100%;max-width:380px;text-align:center;transform:scale(.9);transition:transform .3s;}
        .pw-modal.open .pw-box{transform:scale(1);}
        .pw-box h2{color:var(--primary);font-size:1.4rem;margin-bottom:.4rem;}
        .pw-box p{color:var(--muted);font-size:.9rem;margin-bottom:1.8rem;}
        .pw-input{width:100%;padding:1rem;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:10px;font-size:1.3rem;letter-spacing:.3em;text-align:center;outline:none;margin-bottom:1rem;transition:border-color .3s;}
        .pw-input:focus{border-color:var(--primary);}
        .pw-err{color:var(--danger);font-size:.88rem;margin-bottom:.8rem;display:none;}
        .pw-actions{display:flex;gap:.8rem;}
        .pw-actions button{flex:1;}
        /* eye toggle */
        .pw-wrapper{position:relative;display:flex;align-items:center;margin-bottom:1rem;}
        .pw-wrapper .pw-input{margin-bottom:0;padding-right:3rem;}
        .pw-eye{position:absolute;right:.85rem;background:none;border:none;cursor:pointer;font-size:1.15rem;color:var(--muted);padding:0;line-height:1;transition:color .2s;}
        .pw-eye:hover{color:var(--primary);}
    </style>
</head>
<body>
    <span class="deco deco1">✂</span>
    <span class="deco deco2">✂</span>

    <div class="hero">
        <div class="hero-logo">Barber<span>Shop</span> Pro</div>
        <p class="hero-sub">Sistema profesional de gestión para tu barbería</p>
    </div>

    <div class="cards">
        <a href="client.html" class="role-card">
            <span class="rc-icon">💈</span>
            <div class="rc-title">Soy Cliente</div>
            <p class="rc-desc">Agenda tu cita, compra productos y gestiona tus reservas fácilmente.</p>
            <span class="rc-cta client-cta">→ Entrar al portal</span>
        </a>
    </div>

    <!-- Admin Password Modal -->
    <div class="pw-modal" id="pw-modal">
        <div class="pw-box">
            <h2>🔐 Panel Admin</h2>
            <p>Ingresa tu contraseña para continuar</p>
            <div class="pw-wrapper">
                <input type="password" id="pw-input" class="pw-input" placeholder="••••••" maxlength="30" autocomplete="off" onkeydown="if(event.key==='Enter')checkPw()">
                <button class="pw-eye" type="button" onclick="toggleAdminPw(this)" title="Mostrar/ocultar contraseña">👁️</button>
            </div>
            <div class="pw-err" id="pw-err">❌ Contraseña incorrecta. Inténtalo de nuevo.</div>
            <div class="pw-actions">
                <button class="btn btn-secondary" onclick="closeAdminModal()">Cancelar</button>
                <button class="btn btn-primary" onclick="checkPw()">Entrar</button>
            </div>
        </div>
    </div>

    <div id="toast"></div>
    <script src="js/storage.js"></script>
    <script>
        function openAdminModal(){
            document.getElementById('pw-modal').classList.add('open');
            setTimeout(()=>document.getElementById('pw-input').focus(),300);
        }
        function closeAdminModal(){
            document.getElementById('pw-modal').classList.remove('open');
            document.getElementById('pw-input').value='';
            document.getElementById('pw-input').type='password';
            document.querySelector('.pw-eye').textContent='👁️';
            document.getElementById('pw-err').style.display='none';
        }
        function checkPw(){
            const val=document.getElementById('pw-input').value;
            const stored=localStorage.getItem('adminPassword')||'admin123';
            if(val===stored){
                localStorage.setItem('adminAuth','true');
                window.location.href='admin.html';
            } else {
                const e=document.getElementById('pw-err');
                e.style.display='block';
                document.getElementById('pw-input').value='';
                document.getElementById('pw-input').focus();
                setTimeout(()=>e.style.display='none',3000);
            }
        }
        function toggleAdminPw(btn){
            const inp=document.getElementById('pw-input');
            if(inp.type==='password'){
                inp.type='text';
                btn.textContent='🙈';
            } else {
                inp.type='password';
                btn.textContent='👁️';
            }
        }
        document.getElementById('pw-modal').addEventListener('click',function(e){if(e.target===this)closeAdminModal();});
        // Auto-abrir modal si viene de Ctrl+Alt+O desde client.html
        if(new URLSearchParams(window.location.search).get('admin')==='1'){
            openAdminModal();
        }
        // Abrir modal con Ctrl+Alt+O desde esta misma página
        document.addEventListener('keydown', function(e){
            if(e.ctrlKey && e.altKey && e.key.toLowerCase() === 'o'){
                e.preventDefault();
                openAdminModal();
            }
        });
    </script>
</body>
</html>
